<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
  margin:0;
  text-align:center;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}

/* SOAL + GAMBAR */
.question-wrapper{
  display:flex;
  gap:20px;
  align-items:flex-start;
  margin:20px 0;
}

.question{
  flex:1;
  font-size:22px;
  white-space:pre-line;
  text-align:left;
  line-height:1.6;
}

.question-img{
  max-width:280px;
  border-radius:10px;
  margin-left:auto;
  display:none;
}

/* SCORE */
.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.team{
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
}

.active{
  background:#c8f7c5;
  font-weight:bold;
}

.rank1{background:gold}
.rank2{background:silver}
.rank3{background:#cd7f32}

input{
  padding:10px;
  font-size:18px;
  width:220px;
}

button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{ background:#45a049; }

.feedback{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.locked{ background:#eee; }

/* PEMBAHASAN */
.pembahasan-btn{
  background:#2196F3;
}

.pembahasan-panel{
  position:relative;
  margin-top:10px;
  padding:15px;
  background:#f9fbff;
  border-left:5px solid #2196F3;
  border-radius:10px;
  text-align:left;
  font-size:16px;
  display:none;
}

.pembahasan-panel h4{
  margin-top:0;
  color:#2196F3;
}

.close-btn{
  float:right;
  cursor:pointer;
  color:#d9534f;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>🎮 Kuis Matematika</h1>
<h3>Strategi Belanja Hemat Berdasarkan Perhitungan Aritmetika Sosial</h3>
<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div id="questionNumber" style="font-weight:bold;margin-top:10px;"></div>

<div class="question-wrapper">
  <div class="question" id="question"></div>
  <img id="questionImg" class="question-img">
</div>

<div id="pembahasan" class="pembahasan-panel">
<span class="close-btn" onclick="closePembahasan()">✖</span>
<h4>Pembahasan</h4>
<div id="pembahasanText"></div>
</div>

<input id="answer" placeholder="Ketik jawaban...">
<br>

<button onclick="checkAnswer()">Jawab</button>
<button onclick="nextQuestion()">Soal Selanjutnya</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button class="pembahasan-btn" onclick="showPembahasan()">📘 Pembahasan</button>

<div class="feedback" id="feedback"></div>

</div>

<script>

/* ELEMENT */
const question=document.getElementById("question");
const questionImg=document.getElementById("questionImg");
const questionNumber=document.getElementById("questionNumber");
const answer=document.getElementById("answer");
const feedback=document.getElementById("feedback");
const pembahasan=document.getElementById("pembahasan");
const pembahasanText=document.getElementById("pembahasanText");

/* SOAL */
let questions=[
{
  q: "Kamu memiliki anggaran Rp500.000 untuk membeli perlengkapan sekolah. Toko A memberikan diskon 20%, sedangkan Toko B memberikan diskon 10% dan cashback Rp30.000. Barang yang ingin dibeli seharga Rp500.000. Pilihan mana yang lebih hemat?\nA. Toko A\nB. Toko B\nC. Keduanya sama hemat\nD. Tidak cukup informasi",
  a: "Toko A",
  p: "Toko A memberikan diskon 20% × Rp500.000 = Rp100.000 sehingga harga akhir Rp400.000. Toko B memberikan diskon 10% × Rp500.000 = Rp50.000 sehingga harga menjadi Rp450.000, lalu mendapat cashback Rp30.000 sehingga harga efektif Rp420.000. Karena Rp400.000 lebih murah daripada Rp420.000, Toko A lebih hemat. Kunci jawaban pada soal sebelumnya tidak sesuai dan telah diperbaiki.",
  img: ""
},

{
  q: "Sebuah toko menawarkan diskon 15% dan PPN 10% untuk barang seharga Rp600.000. Berapa harga akhir yang harus dibayar?\nA. Rp510.000\nB. Rp561.000\nC. Rp600.000\nD. Rp585.000",
  a: "Rp561.000",
  p: "Diskon 15% dari Rp600.000 adalah Rp90.000 sehingga harga setelah diskon Rp510.000. PPN 10% dari Rp510.000 adalah Rp51.000. Harga akhir yang harus dibayar adalah Rp510.000 + Rp51.000 = Rp561.000.",
  img: ""
},

{
  q: "Kamu ingin membeli 2 jaket masing-masing seharga Rp250.000. Toko A memberikan diskon 10% untuk pembelian kedua, sedangkan Toko B memberikan diskon 5% untuk semua barang. Mana yang lebih hemat?\nA. Toko A\nB. Toko B\nC. Keduanya sama hemat\nD. Tidak cukup informasi",
  a: "Keduanya sama hemat",
  p: "Toko A: jaket pertama Rp250.000 dan jaket kedua mendapat diskon 10% menjadi Rp225.000, sehingga total Rp475.000. Toko B: diskon 5% dari total Rp500.000 adalah Rp25.000 sehingga total juga Rp475.000. Kedua toko memberikan biaya akhir yang sama. Kunci jawaban pada soal sebelumnya diperbaiki.",
  img: ""
},

{
  q: "Dengan anggaran Rp1.000.000, kamu ingin membeli barang-barang berikut: Sepatu Rp400.000, Tas Rp300.000, Jaket Rp350.000. Toko memberikan diskon 20% untuk semua barang. Apakah anggaranmu cukup?\nA. Ya, cukup\nB. Tidak cukup\nC. Hanya cukup untuk dua barang\nD. Perlu tambahan Rp50.000",
  a: "Ya, cukup",
  p: "Total harga awal adalah Rp400.000 + Rp300.000 + Rp350.000 = Rp1.050.000. Diskon 20% dari Rp1.050.000 adalah Rp210.000 sehingga harga akhir Rp840.000. Karena Rp840.000 masih di bawah anggaran Rp1.000.000, anggaran tersebut cukup.",
  img: ""
},

{
  q: "Promo: Beli 2 gratis 1 untuk barang seharga Rp150.000. Jika kamu membeli 3 barang, berapa harga rata-rata per barang yang kamu bayar?\nA. Rp150.000\nB. Rp100.000\nC. Rp75.000\nD. Rp50.000",
  a: "Rp100.000",
  p: "Dengan promo beli 2 gratis 1, pembeli hanya membayar 2 barang, yaitu 2 × Rp150.000 = Rp300.000. Jumlah barang yang diterima 3 buah. Harga rata-rata per barang adalah Rp300.000 ÷ 3 = Rp100.000.",
  img: ""
}
];

/* DATA */
let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);

/* TIMER */
let timeLeft=3600;
let timerInterval;
const timerEl=document.getElementById("timer");

function startTimer(){
  timerInterval=setInterval(()=>{
    if(timeLeft<=0){
      endQuiz();
      return;
    }
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;
    timerEl.textContent=`Waktu: ${m}:${s}`;
    timeLeft--;
  },1000);
}

/* TAMPIL SOAL */
function showQuestion(){

pembahasan.style.display="none";

if(answered.every(v=>v)){
endQuiz();
return;
}

let q=questions[currentQuestion];

question.textContent=q.q;
questionNumber.textContent=`Soal ${currentQuestion+1} dari ${questions.length}`;

if(q.img){
questionImg.src=q.img;
questionImg.style.display="block";
}else{
questionImg.style.display="none";
}

if(answered[currentQuestion]){
answer.value="Soal sudah benar";
answer.disabled=true;
answer.classList.add("locked");
}else{
answer.value="";
answer.disabled=false;
answer.classList.remove("locked");
feedback.textContent="";
}

}

/* NAVIGASI */
function nextQuestion(){
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
}

/* CEK JAWABAN */
function checkAnswer(){

if(answer.disabled)return;

let user=answer.value.trim().toLowerCase();
let correct=questions[currentQuestion].a.trim().toLowerCase();

if(user===correct){

scores[currentTeam]++;
answered[currentQuestion]=true;

feedback.textContent="✅ Benar";

updateScore();

setTimeout(()=>{
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
},500);

}else{

wrongs[currentTeam]++;
feedback.textContent="❌ Salah";

updateScore();

}

}

/* SKOR */
function updateScore(){
for(let i=0;i<4;i++){

let skor=scores[i]-wrongs[i];

document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${skor}`;

}
}

/* REGU */
function switchTeam(){

document.getElementById("team"+(currentTeam+1)).classList.remove("active");

currentTeam=(currentTeam+1)%4;

document.getElementById("team"+(currentTeam+1)).classList.add("active");

}

/* PEMBAHASAN */
function showPembahasan(){

let p=questions[currentQuestion].p;

if(!p){
pembahasanText.textContent="Pembahasan belum tersedia";
}else{
pembahasanText.textContent=p;
}

pembahasan.style.display="block";

}

function closePembahasan(){
pembahasan.style.display="none";
}

/* AKHIR */
function endQuiz(){
  clearInterval(timerInterval);

  let finalScores=scores.map((b,i)=>b-wrongs[i]);
  let ranking=finalScores
    .map((s,i)=>({team:i+1,skor:s}))
    .sort((a,b)=>b.skor-a.skor);

  let text="🏁 KUIS SELESAI\n\n";
  ranking.forEach((r,i)=>{
    text+=`Juara ${i+1}: Regu ${r.team} → Skor ${r.skor}\n`;
  });

  question.textContent=text;
  questionImg.style.display="none";
  questionNumber.textContent="";
  answer.disabled=true;
  feedback.textContent="";

  ranking.forEach((r,i)=>{
    let el=document.getElementById("team"+r.team);
    if(i===0) el.classList.add("rank1");
    if(i===1) el.classList.add("rank2");
    if(i===2) el.classList.add("rank3");
  });
}

/* START */
updateScore();
showQuestion();
startTimer();

</script>

<h3>Dian Wiguna</h3>

</body>
</html>
