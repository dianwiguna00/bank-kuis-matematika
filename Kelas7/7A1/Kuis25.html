<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
  margin:0;
  text-align:center;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}

/* SOAL + GAMBAR */
.question-wrapper{
  display:flex;
  gap:20px;
  align-items:flex-start;
  margin:20px 0;
}

.question{
  flex:1;
  font-size:22px;
  white-space:pre-line;
  text-align:left;
  line-height:1.6;
}

.question-img{
  max-width:280px;
  border-radius:10px;
  margin-left:auto;
  display:none;
}

/* SCORE */
.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.team{
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
}

.active{
  background:#c8f7c5;
  font-weight:bold;
}

.rank1{background:gold}
.rank2{background:silver}
.rank3{background:#cd7f32}

input{
  padding:10px;
  font-size:18px;
  width:220px;
}

button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{ background:#45a049; }

.feedback{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.locked{ background:#eee; }

/* PEMBAHASAN */
.pembahasan-btn{
  background:#2196F3;
}

.pembahasan-panel{
  position:relative;
  margin-top:10px;
  padding:15px;
  background:#f9fbff;
  border-left:5px solid #2196F3;
  border-radius:10px;
  text-align:left;
  font-size:16px;
  display:none;
}

.pembahasan-panel h4{
  margin-top:0;
  color:#2196F3;
}

.close-btn{
  float:right;
  cursor:pointer;
  color:#d9534f;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>🎮 Kuis Matematika</h1>
<h3>Konsep Bunga Tunggal dan Nilai Akhir Tabungan</h3>
<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div id="questionNumber" style="font-weight:bold;margin-top:10px;"></div>

<div class="question-wrapper">
  <div class="question" id="question"></div>
  <img id="questionImg" class="question-img">
</div>

<div id="pembahasan" class="pembahasan-panel">
<span class="close-btn" onclick="closePembahasan()">✖</span>
<h4>Pembahasan</h4>
<div id="pembahasanText"></div>
</div>

<input id="answer" placeholder="Ketik jawaban...">
<br>

<button onclick="checkAnswer()">Jawab</button>
<button onclick="nextQuestion()">Soal Selanjutnya</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button class="pembahasan-btn" onclick="showPembahasan()">📘 Pembahasan</button>

<div class="feedback" id="feedback"></div>

</div>

<script>

/* ELEMENT */
const question=document.getElementById("question");
const questionImg=document.getElementById("questionImg");
const questionNumber=document.getElementById("questionNumber");
const answer=document.getElementById("answer");
const feedback=document.getElementById("feedback");
const pembahasan=document.getElementById("pembahasan");
const pembahasanText=document.getElementById("pembahasanText");

/* SOAL */
let questions=[
{
  q: "Rina menabung Rp2.000.000 di bank dengan bunga tunggal 6% per tahun selama 2 tahun. Berapa nilai akhir tabungan Rina?\nA. Rp2.120.000\nB. Rp2.240.000\nC. Rp2.360.000\nD. Rp2.400.000",
  a: "Rp2.240.000",
  p: "Bunga tunggal dihitung dengan rumus B = (p × r × t) / 100. Bunga = (2.000.000 × 6 × 2) / 100 = Rp240.000. Nilai akhir tabungan adalah jumlah modal ditambah bunga, yaitu Rp2.000.000 + Rp240.000 = Rp2.240.000.",
  img: ""
},

{
  q: "Doni menabung Rp1.500.000 dengan bunga tunggal 8% per tahun selama 3 tahun. Berapa besar bunga yang diperoleh?\nA. Rp360.000\nB. Rp320.000\nC. Rp300.000\nD. Rp280.000",
  a: "Rp360.000",
  p: "Bunga tunggal = (1.500.000 × 8 × 3) / 100 = Rp360.000. Kunci pada soal sebelumnya keliru dan diperbaiki sesuai perhitungan yang benar.",
  img: ""
},

{
  q: "Sebuah investasi sebesar Rp5.000.000 menghasilkan bunga tunggal 10% per tahun. Berapa nilai akhir investasi setelah 1,5 tahun?\nA. Rp5.750.000\nB. Rp5.500.000\nC. Rp5.250.000\nD. Rp5.000.000",
  a: "Rp5.750.000",
  p: "Bunga tunggal = (5.000.000 × 10 × 1,5) / 100 = Rp750.000. Nilai akhir investasi adalah Rp5.000.000 + Rp750.000 = Rp5.750.000.",
  img: ""
},

{
  q: "Jika bunga tunggal 5% per tahun dan kamu menabung Rp3.500.000, berapa lama waktu yang dibutuhkan agar tabunganmu menjadi Rp4.000.000?\nA. 2 tahun\nB. 3 tahun\nC. 4 tahun\nD. 5 tahun",
  a: "3 tahun",
  p: "Bunga yang dibutuhkan = Rp4.000.000 − Rp3.500.000 = Rp500.000. Waktu dihitung dengan t = (100 × bunga) / (modal × persen). t = (100 × 500.000) / (3.500.000 × 5) ≈ 2,86 tahun, dibulatkan menjadi 3 tahun.",
  img: ""
},

{
  q: "Tabungan sebesar Rp2.500.000 menghasilkan bunga tunggal 4% per tahun. Berapa nilai akhir tabungan setelah 2 tahun?\nA. Rp2.700.000\nB. Rp2.600.000\nC. Rp2.800.000\nD. Rp2.900.000",
  a: "Rp2.700.000",
  p: "Bunga tunggal = (2.500.000 × 4 × 2) / 100 = Rp200.000. Nilai akhir tabungan adalah Rp2.500.000 + Rp200.000 = Rp2.700.000. Kunci jawaban pada soal sebelumnya tidak sesuai dan telah diperbaiki.",
  img: ""
}

];

/* DATA */
let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);

/* TIMER */
let timeLeft=3600;
let timerInterval;
const timerEl=document.getElementById("timer");

function startTimer(){
  timerInterval=setInterval(()=>{
    if(timeLeft<=0){
      endQuiz();
      return;
    }
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;
    timerEl.textContent=`Waktu: ${m}:${s}`;
    timeLeft--;
  },1000);
}

/* TAMPIL SOAL */
function showQuestion(){

pembahasan.style.display="none";

if(answered.every(v=>v)){
endQuiz();
return;
}

let q=questions[currentQuestion];

question.textContent=q.q;
questionNumber.textContent=`Soal ${currentQuestion+1} dari ${questions.length}`;

if(q.img){
questionImg.src=q.img;
questionImg.style.display="block";
}else{
questionImg.style.display="none";
}

if(answered[currentQuestion]){
answer.value="Soal sudah benar";
answer.disabled=true;
answer.classList.add("locked");
}else{
answer.value="";
answer.disabled=false;
answer.classList.remove("locked");
feedback.textContent="";
}

}

/* NAVIGASI */
function nextQuestion(){
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
}

/* CEK JAWABAN */
function checkAnswer(){

if(answer.disabled)return;

let user=answer.value.trim().toLowerCase();
let correct=questions[currentQuestion].a.trim().toLowerCase();

if(user===correct){

scores[currentTeam]++;
answered[currentQuestion]=true;

feedback.textContent="✅ Benar";

updateScore();

setTimeout(()=>{
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
},500);

}else{

wrongs[currentTeam]++;
feedback.textContent="❌ Salah";

updateScore();

}

}

/* SKOR */
function updateScore(){
for(let i=0;i<4;i++){

let skor=scores[i]-wrongs[i];

document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${skor}`;

}
}

/* REGU */
function switchTeam(){

document.getElementById("team"+(currentTeam+1)).classList.remove("active");

currentTeam=(currentTeam+1)%4;

document.getElementById("team"+(currentTeam+1)).classList.add("active");

}

/* PEMBAHASAN */
function showPembahasan(){

let p=questions[currentQuestion].p;

if(!p){
pembahasanText.textContent="Pembahasan belum tersedia";
}else{
pembahasanText.textContent=p;
}

pembahasan.style.display="block";

}

function closePembahasan(){
pembahasan.style.display="none";
}

/* AKHIR */
function endQuiz(){
  clearInterval(timerInterval);

  let finalScores=scores.map((b,i)=>b-wrongs[i]);
  let ranking=finalScores
    .map((s,i)=>({team:i+1,skor:s}))
    .sort((a,b)=>b.skor-a.skor);

  let text="🏁 KUIS SELESAI\n\n";
  ranking.forEach((r,i)=>{
    text+=`Juara ${i+1}: Regu ${r.team} → Skor ${r.skor}\n`;
  });

  question.textContent=text;
  questionImg.style.display="none";
  questionNumber.textContent="";
  answer.disabled=true;
  feedback.textContent="";

  ranking.forEach((r,i)=>{
    let el=document.getElementById("team"+r.team);
    if(i===0) el.classList.add("rank1");
    if(i===1) el.classList.add("rank2");
    if(i===2) el.classList.add("rank3");
  });
}

/* START */
updateScore();
showQuestion();
startTimer();

</script>

<h3>Dian Wiguna</h3>

</body>
</html>
