<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>

body{
  font-family:Arial;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
  margin:0;
  text-align:center;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{margin:5px}

.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}

.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.team{
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
}

.active{
  background:#c8f7c5;
  font-weight:bold;
}

.question{
  font-size:22px;
  margin:20px 0;
  white-space:pre-line;
}

.question-img{
  margin:15px auto;
  max-width:500px;
  width:100%;
  border-radius:10px;
  display:none;
}

input{
  padding:10px;
  font-size:18px;
  width:200px;
  text-align:center;
}

button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#45a049;
}

.feedback{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.rank1{background:gold}
.rank2{background:silver}
.rank3{background:#cd7f32}

</style>
</head>

<body>

<div class="container">

<h1>🎮 Kuis Matematika</h1>
<h3>Mengintegrasikan konsep diskon, pajak, untung, rugi, dan bunga tunggal dalam kehidupan sehari-hari.</h3>

<div class="timer" id="timer">Waktu: 02:00</div>

<div class="score-board">
<div id="team1" class="team active"></div>
<div id="team2" class="team"></div>
<div id="team3" class="team"></div>
<div id="team4" class="team"></div>
</div>

<div class="question" id="question"></div>

<img id="questionImg" class="question-img">

<input id="answer" placeholder="Ketik jawaban...">
<br>

<button onclick="checkAnswer()">Jawab</button>
<button onclick="switchTeam()">Ganti Regu</button>

<div class="feedback" id="feedback"></div>

</div>

<script>

// ================== SOAL ==================

let questions=[

{
  q: "Sebuah toko menjual televisi seharga Rp4000000. Toko memberikan diskon 10% dan mengenakan PPN 11% dari harga setelah diskon. Berapa harga akhir yang harus dibayar pembeli?",
  a: "3996000",
  img: ""
},

{
  q: "Seorang pedagang membeli 10 blender seharga Rp250000 per buah. Ia memberikan diskon 20% kepada pembeli dan tetap mendapat untung Rp20000 per buah setelah diskon. Berapa harga jual sebelum diskon?",
  a: "337500",
  img: ""
},

{
  q: "Kamu menabung Rp2000000 di bank dengan bunga tunggal 5% per tahun. Setelah 2 tahun, kamu ingin membeli handphone seharga Rp2100000 yang dikenai PPN 10%. Apakah tabunganmu cukup?",
  a: "Tidak cukup, kurang 110000",
  img: ""
},

{
  q: "Sebuah toko menjual kulkas seharga Rp3500000. Toko memberikan diskon 15% dan mengenakan PPN 10%. Berapa harga akhir yang harus dibayar?",
  a: "3272500",
  img: ""
},

{
  q: "Sebuah investasi sebesar Rp5000000 menghasilkan bunga tunggal 10% per tahun. Berapa nilai akhir investasi setelah 1,5 tahun?",
  a: "5750000",
  img: ""
}

];


// ================= DATA =================

let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let timeLeft=3600;
let timer;


// ================= TIMER =================

function startTimer(){

timer=setInterval(()=>{

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

if(s<10)s="0"+s;

document.getElementById("timer").innerText=`Waktu: ${m}:${s}`;

if(timeLeft<=0){

clearInterval(timer);
endGame();

}

timeLeft--;

},1000);

}


// ================= TAMPIL SOAL =================

function showQuestion(){

if(currentQuestion>=questions.length){

endGame();
return;

}

let q=questions[currentQuestion];

document.getElementById("question").innerText=q.q;

let imgElement=document.getElementById("questionImg");

if(q.img && q.img!==""){

imgElement.src=q.img;
imgElement.style.display="block";

}else{

imgElement.style.display="none";

}

document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";

}


// ================= CEK JAWABAN =================

function checkAnswer(){

let user=document.getElementById("answer").value.trim().toLowerCase();
let correct=questions[currentQuestion].a.toLowerCase();

if(user===correct){

scores[currentTeam]++;

document.getElementById("feedback").innerText="✅ Benar!";

updateScore();

setTimeout(()=>{

currentQuestion++;

showQuestion();

},500);

}else{

wrongs[currentTeam]++;

document.getElementById("feedback").innerText="❌ Salah!";

updateScore();

}

document.getElementById("answer").value="";

}


// ================= UPDATE SKOR =================

function updateScore(){

for(let i=0;i<4;i++){

let skor=scores[i]-wrongs[i];

document.getElementById("team"+(i+1)).innerText=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${skor}`;

}

}


// ================= GANTI REGU =================

function switchTeam(){

document.getElementById("team"+(currentTeam+1)).classList.remove("active");

currentTeam=(currentTeam+1)%4;

document.getElementById("team"+(currentTeam+1)).classList.add("active");

}


// ================= AKHIR GAME =================

function endGame(){

clearInterval(timer);

let finalScores=scores.map((b,i)=>b-wrongs[i]);

let ranking=finalScores
.map((s,i)=>({team:i+1,skor:s}))
.sort((a,b)=>b.skor-a.skor);

let text="🏁 Kuis Selesai!\n\n";

ranking.forEach((r,i)=>{

text+=`#${i+1} Regu ${r.team} → Skor: ${r.skor}\n`;

});

text+=`\n🏆 Juara: Regu ${ranking[0].team}`;

document.getElementById("question").innerText=text;
document.getElementById("questionImg").style.display="none";

ranking.forEach((r,i)=>{

let el=document.getElementById("team"+r.team);

if(i===0)el.classList.add("rank1");
if(i===1)el.classList.add("rank2");
if(i===2)el.classList.add("rank3");

});

}


// ================= ENTER UNTUK JAWAB =================

document.getElementById("answer")
.addEventListener("keypress",function(e){

if(e.key==="Enter")checkAnswer();

});


// ================= FULLSCREEN (TEKAN F) =================

document.addEventListener("keydown",function(e){

if(e.key==="f"){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}else{

document.exitFullscreen();

}

}

});


// ================= START =================

updateScore();
showQuestion();
startTimer();

</script>

<h3>Dian Wiguna</h3>

</body>
</html>
