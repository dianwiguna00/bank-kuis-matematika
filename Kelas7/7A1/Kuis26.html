<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
  margin:0;
  text-align:center;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}

/* SOAL + GAMBAR */
.question-wrapper{
  display:flex;
  gap:20px;
  align-items:flex-start;
  margin:20px 0;
}

.question{
  flex:1;
  font-size:22px;
  white-space:pre-line;
  text-align:left;
  line-height:1.6;
}

.question-img{
  max-width:280px;
  border-radius:10px;
  margin-left:auto;
  display:none;
}

/* SCORE */
.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.team{
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
}

.active{
  background:#c8f7c5;
  font-weight:bold;
}

.rank1{background:gold}
.rank2{background:silver}
.rank3{background:#cd7f32}

input{
  padding:10px;
  font-size:18px;
  width:220px;
}

button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{ background:#45a049; }

.feedback{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.locked{ background:#eee; }

/* PEMBAHASAN */
.pembahasan-btn{
  background:#2196F3;
}

.pembahasan-panel{
  position:relative;
  margin-top:10px;
  padding:15px;
  background:#f9fbff;
  border-left:5px solid #2196F3;
  border-radius:10px;
  text-align:left;
  font-size:16px;
  display:none;
}

.pembahasan-panel h4{
  margin-top:0;
  color:#2196F3;
}

.close-btn{
  float:right;
  cursor:pointer;
  color:#d9534f;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>🎮 Kuis Matematika</h1>
<h3>Mengintegrasikan konsep diskon, pajak, untung, rugi, dan bunga tunggal dalam kehidupan sehari-hari.</h3>
<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div id="questionNumber" style="font-weight:bold;margin-top:10px;"></div>

<div class="question-wrapper">
  <div class="question" id="question"></div>
  <img id="questionImg" class="question-img">
</div>

<div id="pembahasan" class="pembahasan-panel">
<span class="close-btn" onclick="closePembahasan()">✖</span>
<h4>Pembahasan</h4>
<div id="pembahasanText"></div>
</div>

<input id="answer" placeholder="Ketik jawaban...">
<br>

<button onclick="checkAnswer()">Jawab</button>
<button onclick="nextQuestion()">Soal Selanjutnya</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button class="pembahasan-btn" onclick="showPembahasan()">📘 Pembahasan</button>

<div class="feedback" id="feedback"></div>

</div>

<script>

/* ELEMENT */
const question=document.getElementById("question");
const questionImg=document.getElementById("questionImg");
const questionNumber=document.getElementById("questionNumber");
const answer=document.getElementById("answer");
const feedback=document.getElementById("feedback");
const pembahasan=document.getElementById("pembahasan");
const pembahasanText=document.getElementById("pembahasanText");

/* SOAL */
let questions=[
{
  q: "Sebuah toko menjual televisi seharga Rp4.000.000. Toko memberikan diskon 10% dan mengenakan PPN 11% dari harga setelah diskon. Berapa harga akhir yang harus dibayar pembeli?\nA. Rp3.960.000\nB. Rp3.996.000\nC. Rp4.400.000\nD. Rp4.140.000",
  a: "Rp3.996.000",
  p: "Diskon 10% dari Rp4.000.000 adalah Rp400.000 sehingga harga setelah diskon Rp3.600.000. PPN 11% dari Rp3.600.000 adalah Rp396.000. Harga akhir yang harus dibayar = Rp3.600.000 + Rp396.000 = Rp3.996.000.",
  img: ""
},

{
  q: "Seorang pedagang membeli 10 blender seharga Rp250.000 per buah. Ia memberikan diskon 20% kepada pembeli dan tetap mendapat untung Rp20.000 per buah setelah diskon. Berapa harga jual sebelum diskon?\nA. Rp300.000\nB. Rp270.000\nC. Rp280.000\nD. Rp337.500",
  a: "Rp337.500",
  p: "Harga beli per buah Rp250.000 dan untung Rp20.000, sehingga harga jual setelah diskon Rp270.000. Karena diskon 20%, maka harga setelah diskon = 80% dari harga awal. Harga jual sebelum diskon = Rp270.000 ÷ 0,8 = Rp337.500.",
  img: ""
},

{
  q: "Kamu menabung Rp2.000.000 di bank dengan bunga tunggal 5% per tahun. Setelah 2 tahun, kamu ingin membeli handphone seharga Rp2.100.000 yang dikenai PPN 10%. Apakah tabunganmu cukup?\nA. Cukup, sisa Rp100.000\nB. Tidak cukup, kurang Rp110.000\nC. Cukup pas\nD. Tidak cukup, kurang Rp10.000",
  a: "Tidak cukup, kurang Rp110.000",
  p: "Bunga tunggal = (5 × 2.000.000 × 2) / 100 = Rp200.000 sehingga total tabungan Rp2.200.000. Harga HP setelah PPN 10% = Rp2.100.000 + Rp210.000 = Rp2.310.000. Kekurangan dana = Rp2.310.000 − Rp2.200.000 = Rp110.000.",
  img: ""
},

{
  q: "Sebuah toko menjual kulkas seharga Rp3.500.000. Toko memberikan diskon 15% dan mengenakan PPN 10%. Berapa harga akhir yang harus dibayar?\nA. Rp3.332.500\nB. Rp3.500.000\nC. Rp3.267.500\nD. Rp3.400.000",
  a: "Rp3.272.500",
  p: "Diskon 15% dari Rp3.500.000 adalah Rp525.000 sehingga harga setelah diskon Rp2.975.000. PPN 10% dari Rp2.975.000 adalah Rp297.500. Harga akhir = Rp2.975.000 + Rp297.500 = Rp3.272.500. Kunci sebelumnya tidak sesuai dan telah diperbaiki.",
  img: ""
},

{
  q: "Sebuah investasi sebesar Rp5.000.000 menghasilkan bunga tunggal 10% per tahun. Berapa nilai akhir investasi setelah 1,5 tahun?\nA. Rp5.750.000\nB. Rp5.500.000\nC. Rp5.250.000\nD. Rp5.000.000",
  a: "Rp5.750.000",
  p: "Bunga tunggal = (10 × 5.000.000 × 1,5) / 100 = Rp750.000. Nilai akhir investasi = Rp5.000.000 + Rp750.000 = Rp5.750.000. Jawaban pada soal sebelumnya keliru dan diperbaiki sesuai perhitungan.",
  img: ""
}
];

/* DATA */
let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);

/* TIMER */
let timeLeft=3600;
let timerInterval;
const timerEl=document.getElementById("timer");

function startTimer(){
  timerInterval=setInterval(()=>{
    if(timeLeft<=0){
      endQuiz();
      return;
    }
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;
    timerEl.textContent=`Waktu: ${m}:${s}`;
    timeLeft--;
  },1000);
}

/* TAMPIL SOAL */
function showQuestion(){

pembahasan.style.display="none";

if(answered.every(v=>v)){
endQuiz();
return;
}

let q=questions[currentQuestion];

question.textContent=q.q;
questionNumber.textContent=`Soal ${currentQuestion+1} dari ${questions.length}`;

if(q.img){
questionImg.src=q.img;
questionImg.style.display="block";
}else{
questionImg.style.display="none";
}

if(answered[currentQuestion]){
answer.value="Soal sudah benar";
answer.disabled=true;
answer.classList.add("locked");
}else{
answer.value="";
answer.disabled=false;
answer.classList.remove("locked");
feedback.textContent="";
}

}

/* NAVIGASI */
function nextQuestion(){
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
}

/* CEK JAWABAN */
function checkAnswer(){

if(answer.disabled)return;

let user=answer.value.trim().toLowerCase();
let correct=questions[currentQuestion].a.trim().toLowerCase();

if(user===correct){

scores[currentTeam]++;
answered[currentQuestion]=true;

feedback.textContent="✅ Benar";

updateScore();

setTimeout(()=>{
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
},500);

}else{

wrongs[currentTeam]++;
feedback.textContent="❌ Salah";

updateScore();

}

}

/* SKOR */
function updateScore(){
for(let i=0;i<4;i++){

let skor=scores[i]-wrongs[i];

document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${skor}`;

}
}

/* REGU */
function switchTeam(){

document.getElementById("team"+(currentTeam+1)).classList.remove("active");

currentTeam=(currentTeam+1)%4;

document.getElementById("team"+(currentTeam+1)).classList.add("active");

}

/* PEMBAHASAN */
function showPembahasan(){

let p=questions[currentQuestion].p;

if(!p){
pembahasanText.textContent="Pembahasan belum tersedia";
}else{
pembahasanText.textContent=p;
}

pembahasan.style.display="block";

}

function closePembahasan(){
pembahasan.style.display="none";
}

/* AKHIR */
function endQuiz(){
  clearInterval(timerInterval);

  let finalScores=scores.map((b,i)=>b-wrongs[i]);
  let ranking=finalScores
    .map((s,i)=>({team:i+1,skor:s}))
    .sort((a,b)=>b.skor-a.skor);

  let text="🏁 KUIS SELESAI\n\n";
  ranking.forEach((r,i)=>{
    text+=`Juara ${i+1}: Regu ${r.team} → Skor ${r.skor}\n`;
  });

  question.textContent=text;
  questionImg.style.display="none";
  questionNumber.textContent="";
  answer.disabled=true;
  feedback.textContent="";

  ranking.forEach((r,i)=>{
    let el=document.getElementById("team"+r.team);
    if(i===0) el.classList.add("rank1");
    if(i===1) el.classList.add("rank2");
    if(i===2) el.classList.add("rank3");
  });
}

/* START */
updateScore();
showQuestion();
startTimer();

</script>

<h3>Dian Wiguna</h3>

</body>
</html>
