<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
  margin:0;
  text-align:center;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}

/* SOAL + GAMBAR */
.question-wrapper{
  display:flex;
  gap:20px;
  align-items:flex-start;
  margin:20px 0;
}

.question{
  flex:1;
  font-size:22px;
  white-space:pre-line;
  text-align:left;
  line-height:1.6;
}

.question-img{
  max-width:280px;
  border-radius:10px;
  margin-left:auto;
  display:none;
}

/* SCORE */
.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.team{
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
}

.active{
  background:#c8f7c5;
  font-weight:bold;
}

.rank1{background:gold}
.rank2{background:silver}
.rank3{background:#cd7f32}

input{
  padding:10px;
  font-size:18px;
  width:220px;
}

button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{ background:#45a049; }

.feedback{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.locked{ background:#eee; }

/* PEMBAHASAN */
.pembahasan-btn{
  background:#2196F3;
}

.pembahasan-panel{
  position:relative;
  margin-top:10px;
  padding:15px;
  background:#f9fbff;
  border-left:5px solid #2196F3;
  border-radius:10px;
  text-align:left;
  font-size:16px;
  display:none;
}

.pembahasan-panel h4{
  margin-top:0;
  color:#2196F3;
}

.close-btn{
  float:right;
  cursor:pointer;
  color:#d9534f;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>🎮 Kuis Matematika</h1>
<h3>Menyelesaikan Masalah Perbandingan Senilai Menggunakan Tabel dan Grafik</h3>
<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div id="questionNumber" style="font-weight:bold;margin-top:10px;"></div>

<div class="question-wrapper">
  <div class="question" id="question"></div>
  <img id="questionImg" class="question-img">
</div>

<div id="pembahasan" class="pembahasan-panel">
<span class="close-btn" onclick="closePembahasan()">✖</span>
<h4>Pembahasan</h4>
<div id="pembahasanText"></div>
</div>

<input id="answer" placeholder="Ketik jawaban...">
<br>

<button onclick="checkAnswer()">Jawab</button>
<button onclick="nextQuestion()">Soal Selanjutnya</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button class="pembahasan-btn" onclick="showPembahasan()">📘 Pembahasan</button>

<div class="feedback" id="feedback"></div>

</div>

<script>

/* ELEMENT */
const question=document.getElementById("question");
const questionImg=document.getElementById("questionImg");
const questionNumber=document.getElementById("questionNumber");
const answer=document.getElementById("answer");
const feedback=document.getElementById("feedback");
const pembahasan=document.getElementById("pembahasan");
const pembahasanText=document.getElementById("pembahasanText");

/* SOAL */
let questions=[
{
  q: "Perhatikan tabel berikut tentang harga minyak goreng.\n\nLiter | Harga Total (Rp)\n1 | 14.000\n2 | 28.000\n3 | 42.000\n4 | 56.000\n5 | 70.000\n6 | 84.000\n\nBerdasarkan tabel di atas, berapakah harga untuk 5 liter minyak goreng?\nA. Rp56.000\nB. Rp60.000\nC. Rp70.000\nD. Rp75.000",
  a: "Rp70.000",
  p: "Dari tabel terlihat bahwa harga minyak goreng berbanding senilai dengan jumlah liter. Harga per liter adalah Rp14.000 sehingga harga untuk 5 liter adalah 5 × Rp14.000 = Rp70.000. Kunci jawaban pada soal sebelumnya diperbaiki.",
  img: ""
},

{
  q: "Sebuah mobil menempuh jarak 60 km setiap jam. Berikut tabel jarak tempuh selama beberapa jam:\n\nWaktu (jam) | Jarak (km)\n1 | 60\n2 | 120\n3 | 180\n4 | 240\n5 | 300\n\nJika mobil berjalan selama 4 jam, berapa jarak yang ditempuh?\nA. 120 km\nB. 180 km\nC. 240 km\nD. 300 km",
  a: "240 km",
  p: "Mobil menempuh jarak 60 km setiap jam. Maka dalam 4 jam jarak yang ditempuh adalah 4 × 60 = 240 km.",
  img: ""
},

{
  q: "Perhatikan grafik hubungan antara jumlah buku tulis dan harga total berikut (setiap buku seharga Rp3.500):\n\nJumlah Buku: 1  2  4  6\nHarga Total: 3.500  7.000  14.000  21.000\n\nBerapakah harga untuk 4 buku tulis?\nA. Rp7.000\nB. Rp10.500\nC. Rp14.000\nD. Rp21.000",
  a: "Rp14.000",
  p: "Harga satu buku adalah Rp3.500. Maka harga untuk 4 buku adalah 4 × Rp3.500 = Rp14.000.",
  img: ""
},

{
  q: "Berikut adalah tabel waktu dan jarak tempuh sepeda:\n\nWaktu (jam) | Jarak (km)\n1 | 25\n2 | 50\n3 | 75\n4 | 100\n\nJika sepeda berjalan selama 3 jam, berapa jarak yang ditempuh?\nA. 50 km\nB. 60 km\nC. 75 km\nD. 100 km",
  a: "75 km",
  p: "Berdasarkan tabel, sepeda menempuh jarak 25 km setiap jam. Dalam 3 jam jarak yang ditempuh adalah 3 × 25 = 75 km.",
  img: ""
},

{
  q: "Berdasarkan grafik garis lurus yang melalui titik (0,0) dan (5,50), hubungan antara waktu (jam) dan jarak (km) adalah...\nA. Setiap jam bertambah 5 km\nB. Setiap jam bertambah 10 km\nC. Setiap jam bertambah 50 km\nD. Setiap jam bertambah 25 km",
  a: "Setiap jam bertambah 10 km",
  p: "Grafik melalui titik (0,0) dan (5,50) menunjukkan jarak 50 km ditempuh dalam 5 jam. Gradien grafik adalah 50 ÷ 5 = 10 km per jam. Jadi setiap jam jarak bertambah 10 km. Kunci jawaban dikoreksi sesuai konsep gradien grafik.",
  img: ""
}
];

/* DATA */
let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);

/* TIMER */
let timeLeft=3600;
let timerInterval;
const timerEl=document.getElementById("timer");

function startTimer(){
  timerInterval=setInterval(()=>{
    if(timeLeft<=0){
      endQuiz();
      return;
    }
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;
    timerEl.textContent=`Waktu: ${m}:${s}`;
    timeLeft--;
  },1000);
}

/* TAMPIL SOAL */
function showQuestion(){

pembahasan.style.display="none";

if(answered.every(v=>v)){
endQuiz();
return;
}

let q=questions[currentQuestion];

question.textContent=q.q;
questionNumber.textContent=`Soal ${currentQuestion+1} dari ${questions.length}`;

if(q.img){
questionImg.src=q.img;
questionImg.style.display="block";
}else{
questionImg.style.display="none";
}

if(answered[currentQuestion]){
answer.value="Soal sudah benar";
answer.disabled=true;
answer.classList.add("locked");
}else{
answer.value="";
answer.disabled=false;
answer.classList.remove("locked");
feedback.textContent="";
}

}

/* NAVIGASI */
function nextQuestion(){
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
}

/* CEK JAWABAN */
function checkAnswer(){

if(answer.disabled)return;

let user=answer.value.trim().toLowerCase();
let correct=questions[currentQuestion].a.trim().toLowerCase();

if(user===correct){

scores[currentTeam]++;
answered[currentQuestion]=true;

feedback.textContent="✅ Benar";

updateScore();

setTimeout(()=>{
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
},500);

}else{

wrongs[currentTeam]++;
feedback.textContent="❌ Salah";

updateScore();

}

}

/* SKOR */
function updateScore(){
for(let i=0;i<4;i++){

let skor=scores[i]-wrongs[i];

document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${skor}`;

}
}

/* REGU */
function switchTeam(){

document.getElementById("team"+(currentTeam+1)).classList.remove("active");

currentTeam=(currentTeam+1)%4;

document.getElementById("team"+(currentTeam+1)).classList.add("active");

}

/* PEMBAHASAN */
function showPembahasan(){

let p=questions[currentQuestion].p;

if(!p){
pembahasanText.textContent="Pembahasan belum tersedia";
}else{
pembahasanText.textContent=p;
}

pembahasan.style.display="block";

}

function closePembahasan(){
pembahasan.style.display="none";
}

/* AKHIR */
function endQuiz(){
  clearInterval(timerInterval);

  let finalScores=scores.map((b,i)=>b-wrongs[i]);
  let ranking=finalScores
    .map((s,i)=>({team:i+1,skor:s}))
    .sort((a,b)=>b.skor-a.skor);

  let text="🏁 KUIS SELESAI\n\n";
  ranking.forEach((r,i)=>{
    text+=`Juara ${i+1}: Regu ${r.team} → Skor ${r.skor}\n`;
  });

  question.textContent=text;
  questionImg.style.display="none";
  questionNumber.textContent="";
  answer.disabled=true;
  feedback.textContent="";

  ranking.forEach((r,i)=>{
    let el=document.getElementById("team"+r.team);
    if(i===0) el.classList.add("rank1");
    if(i===1) el.classList.add("rank2");
    if(i===2) el.classList.add("rank3");
  });
}

/* START */
updateScore();
showQuestion();
startTimer();

</script>

<h3>Dian Wiguna</h3>

</body>
</html>
