<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
  margin:0;
  text-align:center;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}

/* SOAL + GAMBAR */
.question-wrapper{
  display:flex;
  gap:20px;
  align-items:flex-start;
  margin:20px 0;
}

.question{
  flex:1;
  font-size:22px;
  white-space:pre-line;
  text-align:left;
  line-height:1.6;
}

.question-img{
  max-width:280px;
  border-radius:10px;
  margin-left:auto;
  display:none;
}

/* SCORE */
.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.team{
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
}

.active{
  background:#c8f7c5;
  font-weight:bold;
}

.rank1{background:gold}
.rank2{background:silver}
.rank3{background:#cd7f32}

input{
  padding:10px;
  font-size:18px;
  width:220px;
}

button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{ background:#45a049; }

.feedback{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.locked{ background:#eee; }

/* PEMBAHASAN */
.pembahasan-btn{
  background:#2196F3;
}

.pembahasan-panel{
  position:relative;
  margin-top:10px;
  padding:15px;
  background:#f9fbff;
  border-left:5px solid #2196F3;
  border-radius:10px;
  text-align:left;
  font-size:16px;
  display:none;
}

.pembahasan-panel h4{
  margin-top:0;
  color:#2196F3;
}

.close-btn{
  float:right;
  cursor:pointer;
  color:#d9534f;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>🎮 Kuis Matematika</h1>
<h3>Keliling dan Luas Jajar Genjang, Trapesium, dan Belah Ketupat</h3>
<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div id="questionNumber" style="font-weight:bold;margin-top:10px;"></div>

<div class="question-wrapper">
  <div class="question" id="question"></div>
  <img id="questionImg" class="question-img">
</div>

<div id="pembahasan" class="pembahasan-panel">
<span class="close-btn" onclick="closePembahasan()">✖</span>
<h4>Pembahasan</h4>
<div id="pembahasanText"></div>
</div>

<input id="answer" placeholder="Ketik jawaban...">
<br>

<button onclick="checkAnswer()">Jawab</button>
<button onclick="nextQuestion()">Soal Selanjutnya</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button class="pembahasan-btn" onclick="showPembahasan()">📘 Pembahasan</button>

<div class="feedback" id="feedback"></div>

</div>

<script>

/* ELEMENT */
const question=document.getElementById("question");
const questionImg=document.getElementById("questionImg");
const questionNumber=document.getElementById("questionNumber");
const answer=document.getElementById("answer");
const feedback=document.getElementById("feedback");
const pembahasan=document.getElementById("pembahasan");
const pembahasanText=document.getElementById("pembahasanText");

/* SOAL */
let questions=[
{
  q: "Sebuah taman berbentuk jajar genjang memiliki alas 18 m, tinggi 7 m, dan sisi miring 12 m. Hitunglah keliling dan luas taman tersebut!\nA. Keliling = 60 m, Luas = 126 m²\nB. Keliling = 60 m, Luas = 144 m²\nC. Keliling = 72 m, Luas = 126 m²\nD. Keliling = 72 m, Luas = 144 m²",
  a: "Keliling = 60 m, Luas = 126 m²",
  p: "Keliling jajar genjang dihitung dengan 2 × (alas + sisi miring) = 2 × (18 + 12) = 60 m. Luas jajar genjang = alas × tinggi = 18 × 7 = 126 m². Kunci jawaban pada soal diperbaiki sesuai perhitungan yang benar.",
  img: ""
},

{
  q: "Sebuah jembatan berbentuk trapesium memiliki sisi sejajar 14 m dan 10 m, tinggi 6 m, serta dua sisi lainnya masing-masing 8 m dan 7 m. Berapakah keliling dan luas jembatan tersebut?\nA. Keliling = 39 m, Luas = 72 m²\nB. Keliling = 39 m, Luas = 48 m²\nC. Keliling = 40 m, Luas = 72 m²\nD. Keliling = 40 m, Luas = 48 m²",
  a: "Keliling = 39 m, Luas = 72 m²",
  p: "Keliling trapesium adalah jumlah seluruh sisinya: 14 + 10 + 8 + 7 = 39 m. Luas trapesium = ½ × (jumlah sisi sejajar) × tinggi = ½ × (14 + 10) × 6 = 72 m².",
  img: ""
},

{
  q: "Sebuah hiasan dinding berbentuk belah ketupat memiliki panjang sisi 15 cm, diagonal 1 = 24 cm, dan diagonal 2 = 10 cm. Hitunglah keliling dan luas hiasan tersebut!\nA. Keliling = 60 cm, Luas = 120 cm²\nB. Keliling = 60 cm, Luas = 180 cm²\nC. Keliling = 50 cm, Luas = 120 cm²\nD. Keliling = 50 cm, Luas = 180 cm²",
  a: "Keliling = 60 cm, Luas = 120 cm²",
  p: "Keliling belah ketupat = 4 × sisi = 4 × 15 = 60 cm. Luas belah ketupat = ½ × diagonal 1 × diagonal 2 = ½ × 24 × 10 = 120 cm².",
  img: ""
},

{
  q: "Sebuah lapangan parkir berbentuk jajar genjang memiliki alas 25 m, tinggi 8 m, dan sisi miring 14 m. Hitunglah keliling dan luas lapangan parkir tersebut!\nA. Keliling = 78 m, Luas = 200 m²\nB. Keliling = 78 m, Luas = 220 m²\nC. Keliling = 60 m, Luas = 200 m²\nD. Keliling = 60 m, Luas = 220 m²",
  a: "Keliling = 78 m, Luas = 200 m²",
  p: "Keliling = 2 × (alas + sisi miring) = 2 × (25 + 14) = 78 m. Luas = alas × tinggi = 25 × 8 = 200 m².",
  img: ""
},

{
  q: "Sebuah taman kota berbentuk trapesium memiliki sisi sejajar 20 m dan 12 m, tinggi 9 m, serta dua sisi lainnya masing-masing 7 m dan 9 m. Berapakah keliling dan luas taman kota tersebut?\nA. Keliling = 48 m, Luas = 144 m²\nB. Keliling = 48 m, Luas = 72 m²\nC. Keliling = 46 m, Luas = 144 m²\nD. Keliling = 46 m, Luas = 72 m²",
  a: "Keliling = 48 m, Luas = 144 m²",
  p: "Keliling trapesium = 20 + 12 + 7 + 9 = 48 m. Luas = ½ × (20 + 12) × 9 = 144 m².",
  img: ""
}
];

/* DATA */
let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);

/* TIMER */
let timeLeft=3600;
let timerInterval;
const timerEl=document.getElementById("timer");

function startTimer(){
  timerInterval=setInterval(()=>{
    if(timeLeft<=0){
      endQuiz();
      return;
    }
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;
    timerEl.textContent=`Waktu: ${m}:${s}`;
    timeLeft--;
  },1000);
}

/* TAMPIL SOAL */
function showQuestion(){

pembahasan.style.display="none";

if(answered.every(v=>v)){
endQuiz();
return;
}

let q=questions[currentQuestion];

question.textContent=q.q;
questionNumber.textContent=`Soal ${currentQuestion+1} dari ${questions.length}`;

if(q.img){
questionImg.src=q.img;
questionImg.style.display="block";
}else{
questionImg.style.display="none";
}

if(answered[currentQuestion]){
answer.value="Soal sudah benar";
answer.disabled=true;
answer.classList.add("locked");
}else{
answer.value="";
answer.disabled=false;
answer.classList.remove("locked");
feedback.textContent="";
}

}

/* NAVIGASI */
function nextQuestion(){
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
}

/* CEK JAWABAN */
function checkAnswer(){

if(answer.disabled)return;

let user=answer.value.trim().toLowerCase();
let correct=questions[currentQuestion].a.trim().toLowerCase();

if(user===correct){

scores[currentTeam]++;
answered[currentQuestion]=true;

feedback.textContent="✅ Benar";

updateScore();

setTimeout(()=>{
currentQuestion=(currentQuestion+1)%questions.length;
showQuestion();
},500);

}else{

wrongs[currentTeam]++;
feedback.textContent="❌ Salah";

updateScore();

}

}

/* SKOR */
function updateScore(){
for(let i=0;i<4;i++){

let skor=scores[i]-wrongs[i];

document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${skor}`;

}
}

/* REGU */
function switchTeam(){

document.getElementById("team"+(currentTeam+1)).classList.remove("active");

currentTeam=(currentTeam+1)%4;

document.getElementById("team"+(currentTeam+1)).classList.add("active");

}

/* PEMBAHASAN */
function showPembahasan(){

let p=questions[currentQuestion].p;

if(!p){
pembahasanText.textContent="Pembahasan belum tersedia";
}else{
pembahasanText.textContent=p;
}

pembahasan.style.display="block";

}

function closePembahasan(){
pembahasan.style.display="none";
}

/* AKHIR */
function endQuiz(){
  clearInterval(timerInterval);

  let finalScores=scores.map((b,i)=>b-wrongs[i]);
  let ranking=finalScores
    .map((s,i)=>({team:i+1,skor:s}))
    .sort((a,b)=>b.skor-a.skor);

  let text="🏁 KUIS SELESAI\n\n";
  ranking.forEach((r,i)=>{
    text+=`Juara ${i+1}: Regu ${r.team} → Skor ${r.skor}\n`;
  });

  question.textContent=text;
  questionImg.style.display="none";
  questionNumber.textContent="";
  answer.disabled=true;
  feedback.textContent="";

  ranking.forEach((r,i)=>{
    let el=document.getElementById("team"+r.team);
    if(i===0) el.classList.add("rank1");
    if(i===1) el.classList.add("rank2");
    if(i===2) el.classList.add("rank3");
  });
}

/* START */
updateScore();
showQuestion();
startTimer();

</script>

<h3>Dian Wiguna</h3>

</body>
</html>
