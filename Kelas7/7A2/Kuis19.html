<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
  margin:0;
  text-align:center;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{margin:5px}

.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}

.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.team{
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
}

.active{
  background:#c8f7c5;
  font-weight:bold;
}

.question{
  font-size:22px;
  margin:20px 0;
  white-space:pre-line;
}

/* ✅ PERBAIKAN UTAMA DI SINI */
.question-img{
  margin:15px auto;
  max-width:100%;
  width:auto;
  height:auto;
  border-radius:10px;
  display:none;
}

input{
  padding:10px;
  font-size:18px;
  width:200px;
  text-align:center;
}

button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#45a049;
}

.feedback{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.rank1{background:gold}
.rank2{background:silver}
.rank3{background:#cd7f32}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Kuis Matematika</h1>
<h3>Menyajikan Data Bangun Datar dalam Bentuk Tabel dan Grafik</h3>

<div class="timer" id="timer">Waktu: 02:00</div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div class="question" id="question"></div>

<img id="questionImg" class="question-img">

<input id="answer" placeholder="Ketik jawaban...">
<br>

<button onclick="checkAnswer()">Jawab</button>
<button onclick="switchTeam()">Ganti Regu</button>

<div class="feedback" id="feedback"></div>

</div>

<script>
// ================== SOAL ==================

let questions=[

{
  q: "Berdasarkan data keliling dan luas persegi, segitiga, dan lingkaran, bangun datar yang memiliki keliling terbesar adalah...",
  a: "Lingkaran",
  img: "https://drive.google.com/thumbnail?id=1DeAWflIV_oWRrcnPJt8QRaNono75Us5F&sz=w1200"
},
{
  q: "Grafik batang menunjukkan luas Persegi 49 cm2, Jajar Genjang 60 cm2, dan Belah Ketupat 48 cm2. Bangun datar dengan luas terkecil adalah...",
  a: "Belah Ketupat",
  img: ""
},
{
  q: "Dalam sebuah tabel, tercatat trapesium dengan sisi sejajar 12 cm dan 8 cm serta tinggi 5 cm. Luas trapesium tersebut adalah...",
  a: "50",
  img: ""
},
{
  q: "Sebuah grafik menunjukkan keliling Persegi Panjang 40 cm, Segitiga 26 cm, dan Lingkaran 31,4 cm. Bangun datar dengan keliling terkecil adalah...",
  a: "Segitiga",
  img: ""
},
{
  q: "Dalam sebuah tabel, tercatat lingkaran dengan jari-jari 7 cm. Jika π = 22/7, maka luas lingkaran tersebut adalah...",
  a: "154",
  img: ""
}

];


// ================= DATA =================

let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let timeLeft=3600;
let timer;

// ================= TIMER =================

function startTimer(){
  timer=setInterval(()=>{
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;
    document.getElementById("timer").innerText=`Waktu: ${m}:${s}`;
    if(timeLeft<=0){
      clearInterval(timer);
      endGame();
    }
    timeLeft--;
  },1000);
}

// ================= TAMPIL SOAL =================

function showQuestion(){
  if(currentQuestion>=questions.length){
    endGame();
    return;
  }

  let q=questions[currentQuestion];
  document.getElementById("question").innerText=q.q;

  let img=document.getElementById("questionImg");
  if(q.img){
    img.src=q.img;
    img.style.display="block";
  }else{
    img.style.display="none";
  }

  document.getElementById("answer").value="";
  document.getElementById("feedback").innerText="";
}

// ================= CEK JAWABAN =================

function checkAnswer(){
  let user=document.getElementById("answer").value.trim().toLowerCase();
  let correct=questions[currentQuestion].a.toLowerCase();

  if(user===correct){
    scores[currentTeam]++;
    document.getElementById("feedback").innerText="✅ Benar!";
    updateScore();
    setTimeout(()=>{
      currentQuestion++;
      showQuestion();
    },500);
  }else{
    wrongs[currentTeam]++;
    document.getElementById("feedback").innerText="❌ Salah!";
    updateScore();
  }

  document.getElementById("answer").value="";
}

// ================= UPDATE SKOR =================

function updateScore(){
  for(let i=0;i<4;i++){
    let skor=scores[i]-wrongs[i];
    document.getElementById("team"+(i+1)).innerText=
      `Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${skor}`;
  }
}

// ================= GANTI REGU =================

function switchTeam(){
  document.getElementById("team"+(currentTeam+1)).classList.remove("active");
  currentTeam=(currentTeam+1)%4;
  document.getElementById("team"+(currentTeam+1)).classList.add("active");
}

// ================= AKHIR GAME =================

function endGame(){
  clearInterval(timer);
  let finalScores=scores.map((b,i)=>b-wrongs[i]);
  let ranking=finalScores
    .map((s,i)=>({team:i+1,skor:s}))
    .sort((a,b)=>b.skor-a.skor);

  let text="🏁 Kuis Selesai!\n\n";
  ranking.forEach((r,i)=>{
    text+=`#${i+1} Regu ${r.team} → Skor: ${r.skor}\n`;
  });
  text+=`\n🏆 Juara: Regu ${ranking[0].team}`;

  document.getElementById("question").innerText=text;
  document.getElementById("questionImg").style.display="none";

  ranking.forEach((r,i)=>{
    let el=document.getElementById("team"+r.team);
    if(i===0)el.classList.add("rank1");
    if(i===1)el.classList.add("rank2");
    if(i===2)el.classList.add("rank3");
  });
}

// ================= ENTER UNTUK JAWAB =================

document.getElementById("answer")
.addEventListener("keypress",e=>{
  if(e.key==="Enter")checkAnswer();
});

// ================= FULLSCREEN (F) =================

document.addEventListener("keydown",e=>{
  if(e.key==="f"){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen();
    }else{
      document.exitFullscreen();
    }
  }
});

// ================= START =================

updateScore();
showQuestion();
startTimer();
</script>

<h3>Dian Wiguna</h3>

</body>
</html>
